<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title> 紫微斗数 (ZiWi Mobile) </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Mobile Web App Capable (PWA-lite) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="紫府书院">
    <link rel="apple-touch-icon" href="img/Basic 初盘 .png">
    <link rel="icon" type="image/png" href="img/Basic 初盘 .png">

    <style>
        /* Essential base fix for mobile view before CSS loads completely */
        body, html { width: 100%; height: 100%; overflow: hidden; position: fixed; overscroll-behavior: none; margin: 0; padding: 0; }
        #phone-container { width: 100%; height: 100%; position: relative; }
    </style>
</head>
<body>
    <div class="camera-flash" id="camera-flash"></div>
    <div id="phone-container">
        
        <!-- View 1: Security Portal (登入门户) -->
        <section id="view-login" class="app-view active">
            <div class="login-wrapper">
                <div class="login-box">
                    <div class="login-header">
                        <img src="img/ZiFu Logo .png" class="login-logo-img" alt="Logo">
                        <h1>紫府书院</h1>
                        <p>ZI FU ACADEMY</p>
                    </div>
                    
                    <!-- Portal Buttons -->
                    <div id="portal-buttons" class="button-stack">
                        <button id="btn-portal-admin" class="portal-btn admin-theme">
                            <span class="btn-icon">🛡️</span>
                            <div class="btn-text">
                                <span class="main-label">管理员登入</span>
                                <span class="sub-label">Admin Login</span>
                            </div>
                        </button>
                        
                        <button id="btn-portal-member" class="portal-btn member-theme">
                            <span class="btn-icon">💎</span>
                            <div class="btn-text">
                                <span class="main-label">初级会员登入</span>
                                <span class="sub-label">Junior Member Login</span>
                            </div>
                        </button>
                        
                        <p class="portal-footer-hint">只限一人一机，不轻易共享给别人</p>
                    </div>

                    <!-- Hidden Login Forms (Transition to these on click) -->
                    <div id="login-form-container" style="display:none;">
                        <div class="login-form">
                            <h2 id="login-form-title">登入</h2>
                            <div class="login-field">
                                <label>Email</label>
                                <input type="email" id="login-email" placeholder="输入邮箱账户">
                            </div>
                            <div class="login-field">
                                <label>Password</label>
                                <input type="password" id="login-pass" placeholder="输入密码">
                            </div>
                            <button id="btn-login-submit" class="primary-gradient-btn">确认登入 / Verify</button>
                            <button id="btn-login-back" class="secondary-btn">返回 / Back</button>
                            <p id="login-error" class="error-msg"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- View 1.5: Member Settings (管理员专属界面 - 隐藏) -->
        <section id="view-admin-settings" class="app-view">
            <header class="view-header">
                <div class="header-left">
                    <button class="back-btn" id="btn-admin-back">◀</button>
                    <h2>初级会员设定</h2>
                </div>
            </header>
            <div class="view-content scroll-y">
                <div class="admin-panel-card">
                    <h3>初级会员管理列表</h3>
                    <p class="info-text">此处管理已激活的一号一机设备。</p>
                    <div id="approved-member-list" class="member-list">
                        <!-- Dynamic List -->
                        <div class="empty-list-msg">正在从云端加载名单...</div>
                    </div>
                    <div class="admin-actions-row mt-20" style="display:flex; gap:10px;">
                        <button id="btn-add-member" class="icon-text-btn">+ 注册新会员</button>
                        <button id="btn-cloud-sync" class="icon-text-btn" style="background: #eef2ff; border-color: #6573b7;">☁️ 云端同步</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- View 2: Input Panel (新建出生资料) -->
        <section id="view-input" class="app-view">
            <header class="view-header">
                <h2>新建出生资料</h2>
                <div class="header-right" style="display:flex; gap:10px; align-items:center;">
                    <div id="admin-icon-container">
                        <!-- Only injected for Admin -->
                    </div>
                    <button id="btn-logout" class="admin-setting-header-btn">
                        <img src="img/LogOut Icon .png" alt="LogOut">
                    </button>
                </div>
            </header>
            <div class="view-content scroll-y">
                <div id="input-panel-mobile" class="mobile-panel">
                    <div class="panel-card">
                        <label class="card-label">西历 (公历)</label>
                        <div class="date-row">
                            <select id="greg-year"></select> 
                            <select id="greg-month"></select> 
                            <select id="greg-day"></select>
                        </div>
                        <div class="time-row mt-10">
                            <select id="greg-time"></select>
                        </div>
                    </div>

                    <div class="panel-card mt-15">
                        <label class="card-label">农历</label>
                        <div class="lunar-info" id="lunar-date-display">
                            <!-- Computed -->
                        </div>
                    </div>

                    <div class="panel-card mt-15">
                        <label class="card-label">基本信息</label>
                        <div class="input-group">
                            <span>姓名:</span>
                            <input type="text" id="user-name" value="未知">
                        </div>
                        <div class="input-group mt-10">
                            <span>性别:</span>
                            <div class="radio-pill">
                                <label><input type="radio" name="gender" value="M" checked> <span class="gender-label-m">男</span></label>
                                <label><input type="radio" name="gender" value="F"> <span class="gender-label-f">女</span></label>

                            </div>
                        </div>
                    </div>

                    <div class="button-stack mt-20">
                        <button id="btn-save-chart" class="primary-gradient-btn">存档 + 排盘</button>
                        <button id="btn-new-chart" class="secondary-btn">设置新命盘</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- View 3: Sidebar/Records (客户资料) -->
        <section id="view-records" class="app-view">
            <header class="view-header">
                <div class="header-left">
                    <h2>紫微命盘资料</h2>
                </div>
                <div class="header-right" style="display:flex; gap:10px;">
                    <button id="import-btn" class="icon-text-btn">Import 命盘数据</button>
                    <button id="add-group-btn" class="icon-text-btn">+ 新群组</button>
                    <button id="change-pass-btn" class="icon-text-btn" style="display:none;">🔑 改密码</button>
                    <input type="file" id="import-file-input" accept=".txt" style="display:none;">
                </div>
                <p class="privacy-notice">命盘资料是绝对保密的, 因它只会存储在用者个人设备里</p>
            </header>
            <div class="view-content scroll-y">
                <!-- Search Bar Removed as requested -->
                <div id="group-list" class="group-list-mobile">
                    <!-- Dynamic List -->
                </div>
            </div>
        </section>

        <!-- View 4: MainBoard (命盘大厅) -->
        <section id="view-main" class="app-view">
            <div class="main-layout-container">
                <!-- Square Chart Area -->
                <div id="chart-area-mobile" class="square-chart">
                    <div class="chart-grid-container" id="main-board">
                        <div style="grid-area: 1 / 1;" class="palace-box" id="palace-si"></div>
                        <div style="grid-area: 1 / 2;" class="palace-box" id="palace-wu"></div>
                        <div style="grid-area: 1 / 3;" class="palace-box" id="palace-wei"></div>
                        <div style="grid-area: 1 / 4;" class="palace-box" id="palace-shen"></div>
                        
                        <div style="grid-area: 2 / 4;" class="palace-box" id="palace-you"></div>
                        <div style="grid-area: 3 / 4;" class="palace-box" id="palace-xu"></div>
                        <div style="grid-area: 4 / 4;" class="palace-box" id="palace-hai"></div>
                        
                        <div style="grid-area: 4 / 3;" class="palace-box" id="palace-zi"></div>
                        <div style="grid-area: 4 / 2;" class="palace-box" id="palace-chou"></div>
                        <div style="grid-area: 4 / 1;" class="palace-box" id="palace-yin"></div>
                        
                        <div style="grid-area: 3 / 1;" class="palace-box" id="palace-mao"></div>
                        <div style="grid-area: 2 / 1;" class="palace-box" id="palace-chen"></div>
                        
                        <div class="center-area" style="grid-area: 2 / 2 / 4 / 4;">
                                <div class="c-info-col">
                                    <div class="c-row">姓名: <span id="c-name"></span></div>
                                    <div class="c-row">西历: <span id="c-gregorian"></span></div>
                                    <div class="c-row">农历: <span id="c-lunar"></span></div>
                                    <div class="c-row">性别: <span id="c-gender"></span></div>
                                    <div class="c-row">生肖: <span id="c-zodiac"></span></div>
                                    <div class="c-row">五行: <span id="c-elements"></span></div>
                                    <div class="c-row">虚岁: <span id="c-age"></span></div>
                                    <div class="c-row">格局: <span id="c-formation"></span></div>
                                </div>
                        </div>
                    </div>
                </div>

                <!-- Redundant footer info removed. Personal data is now displayed in the chart center. -->
            </div>
        </section>



        <!-- Fixed Bottom Navigation Bar (Pages 2, 3, 4) -->
        <nav id="bottom-nav" style="display:none;">
            <button class="nav-item" data-view="view-input" id="nav-btn-input">
                <img src="img/新建出生 Icon .png" alt="新建">
                <span class="nav-label">新建</span>
            </button>
            <button class="nav-item active" data-view="view-records" id="nav-btn-records">
                <img src="img/命盘资料库 Icon .png" alt="资料">
                <span class="nav-label">资料</span>
            </button>
            <button class="nav-item" data-view="view-main" id="nav-btn-main">
                <img src="img/Basic 初盘 .png" alt="命盘">
                <span class="nav-label">命盘</span>
            </button>
            <div class="nav-divider"></div>
            <button class="nav-item" id="snapshot-btn">
                <img src="img/snapshot.png" alt="截图">
                <span class="nav-label">截图</span>
            </button>

            <button class="nav-item" id="bg-change-btn">
                <img src="img/Phone Wallpapper .png" alt="背景">
                <span class="nav-label">更换背景</span>
            </button>
        </nav>
    </div>

    <!-- Hidden Utils -->
    <input type="file" id="bg-upload-input" accept="image/*" style="display:none">
    <div id="bg-layer" class="bg-layer"></div>
    <div id="context-menu" class="context-menu" style="display: none;">
        <ul>
            <li id="menu-rename">重命名</li>
            <li id="menu-delete" class="danger">删除</li>
        </ul>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="js/lunar.js"></script>
    <script src="js/logo-b64.js"></script>
    <script src="js/app.js?v=security_sync"></script>
    <script src="js/cursor.js"></script>
    <!-- Custom Touch Cursor -->
    <div id="custom-cursor"></div>

    <!-- Security Lockdown Overlay -->
    <div id="security-lockdown" class="lockdown-overlay" style="display:none;">
        <div class="lockdown-box">
            <div class="lock-icon">🔒</div>
            <h2>授权锁定 / Account Locked</h2>
            <p>检测到非法设备登入或链接转发。</p>
            <p class="lock-sub">此账号已绑定在另一台手机，无法在此访问。</p>
            <div class="lock-contact">请联系管理员重置绑定</div>
            <button onclick="location.reload()" class="secondary-btn">重新尝试 / Reload</button>
        </div>
    </div>
</body>
</html>
